---
- name: Remove conflicting devops tools
  ansible.builtin.apt:
    name:
      - awscli                        # Amazon Web Services Command Line Interface
    state: absent
  register: task_result
  until: task_result is success
  retries: 10
  delay: 2

- name: Install AWS CLI
  block:
    - name: "Download awscliv2 installer"
      unarchive:
        src: "https://awscli.amazonaws.com/awscli-exe-linux-{{ ansible_facts['architecture'] }}.zip"
        dest: "/tmp"
        remote_src: true
        creates: '/tmp/aws'
        mode: 0755

    - name: Run the installer.
      command:
      args:
        cmd: "/tmp/aws/install"
        creates: /usr/local/bin/aws
      become: true

    - name: Fix permissions for AWS CLI
      file:
        path: /usr/local/aws-cli/
        mode: 0755
        recurse: yes
      become: true

