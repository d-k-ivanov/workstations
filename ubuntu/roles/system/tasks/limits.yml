---
- name: Set fs.file-max
  ansible.builtin.lineinfile:
    path: /etc/sysctl.d/99-custom.conf
    regexp: '^fs\.file-max\s*='
    line: 'fs.file-max=2147483584'
    create: yes
    mode: '0644'

- name: Set fs.nr_open
  ansible.builtin.lineinfile:
    path: /etc/sysctl.d/99-custom.conf
    regexp: '^fs\.nr_open\s*='
    line: 'fs.nr_open=2147483584'
    create: yes
    mode: '0644'

- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Add or modify hard nofile limits for wildcard domain
  ansible.builtin.lineinfile:
    path: /etc/security/limits.d/99-custom.conf
    regexp: '^\*\s+hard\s+nofile'
    line: '*               hard    nofile          1048576'
    create: yes
    mode: '0644'

- name: Add or modify soft nofile limits for wildcard domain
  ansible.builtin.lineinfile:
    path: /etc/security/limits.d/99-custom.conf
    regexp: '^\*\s+soft\s+nofile'
    line: '*               soft    nofile          1048576'
    create: yes
    mode: '0644'
